            text-decoration: none !important; /* يحمي الرقم من الخطوط الزرقاء في الجوال */

        .iban-copy-btn {

            border: none;
            padding: 10px 30px; /* زيادة الحشو ليكون الزر مريحاً للضغط في الجوال */

            .iban-copy-btn {

<!-- كود الجافا سكريبت مدمج ومباشر هنا لضمان عمل زر النسخ بكفاءة مذهلة دون أي تداخل -->
<script>
function copyPageIBAN() {
    // الرقم المصفى الجاهز للنسخ في حافظة الجهاز الفورية
    const pureIban = "SA8380000513608016075277";

    navigator.clipboard.writeText(pureIban).then(() => {
        const btn = document.getElementById("pageCopyBtn");
        if (btn) {
            btn.innerHTML = '<i class="fa-solid fa-check"></i> تم النسخ!';
            btn.style.backgroundColor = "#28a745"; // تحويل اللون للأخضر الناجح

            setTimeout(() => {
                btn.innerHTML = '<i class="fa-regular fa-copy"></i> نسخ الآيبان';
                btn.style.backgroundColor = "#bfa37a"; // إعادة اللون الذهبي الأصلي
            }, 2000);
        }
    }).catch(err => {
        console.error('تعذر نسخ الرقم برمجياً: ', err);
    });
}
</script>
